<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Alunos</title>
</head>
<body>
    <h1> Gerador de Alunos </h1>
    <h2> Nome do aluno: </h2>
    <input type="text" id="nome" placeholder="Insira o nome do aluno aqui">
    <h2> Nota do aluno: </h2>
    <input type="number" id="nota" placeholder="Insira a nota do aluno aqui">
    <button onclick="adicionar()" id="adicionarBtn"> Adicionar Aluno </button>
    <ul id="lista"></ul>
    <script>
        let alunos = [];
        function adicionar() {
            let nome = document.getElementById('nome').value;
            let nota = Number(document.getElementById('nota').value);


            if(nome !== "" && nota !== "") {
                let aluno = {
                    nome: nome,
                    nota: nota
                };


                alunos.push(aluno);
                atualizarLista();


                document.getElementById("nome").value = "";
                document.Number(getElementById("nota").value = "");


            function atualizarLista(){


    let lista = document.getElementById("lista");
    lista.innerHTML = "";


    let aprovados = alunos.filter(aluno => aluno.nota >= 7);


    for(let i = 0; i < alunos.length; i++) {


        let li = document.createElement("li");


        let destaque = aprovados.includes(alunos[i]);


        if(destaque) {
            li.innerHTML = `<strong>${alunos[i].nome} - Nota: ${alunos[i].nota}</strong>`;
        } else {
            li.innerHTML = `${alunos[i].nome} - Nota: ${alunos[i].nota}`;
        }


        lista.appendChild(li);
                    }
                }
            }
        }
    </script>
</body>
</html>
